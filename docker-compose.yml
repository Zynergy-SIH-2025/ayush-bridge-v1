# docker-compose.yml

version: '3.8'

services:
  # The Library: Your permanent, reliable database for master codes [cite: 22, 23]
  postgres:
    image: postgres:13
    container_name: ayush_postgres
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # The Flashcards: The high-speed cache for autocomplete searches [cite: 24]
  redis:
    image: redis:6-alpine
    container_name: ayush_redis
    restart: always
    ports:
      - "6379:6379"

  # Your Local WHO: A server that provides the ICD-11 terminology [cite: 25]
  icd11-service:
    image: whoicd/icd-api:latest
    container_name: icd11_service
    restart: always
    ports:
      - "8083:80" # Mapping internal port 80 to host 8083 to avoid conflicts

  # The Filing Cabinet: The final destination for patient records [cite: 26]
  hapi-fhir:
    # This is the official, ready-to-use HAPI FHIR server image
    image: hapiproject/hapi:latest
    container_name: hapi_fhir_server
    restart: always
    ports:
      # Exposes the server's port 8080 to your local machine's port 8080
      - "8080:8080"
    environment:
      # Optional: Increase the memory available to the server if you face performance issues
      - JAVA_OPTS=-Djava.awt.headless=true -Xmx2g

volumes:
  postgres_data: